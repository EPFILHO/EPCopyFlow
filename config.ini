[General]
; Nivel de log (DEBUG, INFO, WARNING, ERROR)
log_level = INFO
; Numero maximo de instancias do MT5
max_mt5_instances = 10
; Caminho do diretorio raiz do MT5 instalado
base_mt5_path = C:\Temp\MT5
; Caminho do arquivo de cadastro de corretoras
brokers_file = brokers.json
; Intervalo de verificacao do monitor de processos MT5 (segundos)
monitor_interval = 1
; Pausa inicial do monitoramento (segundos)
monitor_initial_delay = 2

[CopyEngine]
; Host ZMQ — 127.0.0.1 para mesma maquina, ou IP da rede local
host = 127.0.0.1
; Porta base para alocacao dinamica (brokers_dialog usa BASE_PORT=15555, STEP=1)
base_port = 15555
; Fator de lote padrao para slaves sem lot_factor definido no brokers.json
default_lot_factor = 1.0
; Timeout de recepcao ZMQ em milissegundos
recv_timeout_ms = 1000
; Intervalo de heartbeat em segundos
heartbeat_interval_s = 5
; Intervalo de tentativa de reconexao em segundos (backoff)
reconnect_interval_s = 3

; EPCopyFlow — Versao 2.0.0
